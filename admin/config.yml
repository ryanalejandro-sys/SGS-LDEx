      - label: "ILT / VILT"
        name: "ilt"
        file: "index.html"
        fields:
          - label: "Page Headline"
            name: "ilt_headline"
            widget: "string"
            default: "ILT / VILT"
          - label: "Page Lead Text"
            name: "ilt_lead"
            widget: "text"
            default: "Guided by experts. Driven by interaction."

      - label: "Interactive Quizzes & Assessment"
        name: "quiz"
        file: "index.html"
        fields:
          - label: "Page Headline"
            name: "quiz_headline"
            widget: "string"
            default: "Interactive Quizzes & Assessment"
          - label: "Page Lead Text"
            name: "quiz_lead"
            widget: "text"
            default: "Measure what matters. Fast insights for smarter decisions."

  # ── LDEX EDGE ─────────────────────────────────────────────────────────────
  - name: "edge"
    label: "⚡ The LDEx Edge"
    files:
      - label: "Page Content"
        name: "edge_content"
        file: "index.html"
        fields:
          - label: "Page Headline"
            name: "edge_headline"
            widget: "string"
            default: "The LDEx Edge"
          - label: "Page Lead Text"
            name: "edge_lead"
            widget: "text"
            default: "We could tell you we're different. Every vendor does. Instead, here's how we're built."
          - label: "Principle 1 Title"
            name: "edge_p1_title"
            widget: "string"
            default: "Experiential by Design"
          - label: "Principle 1 Body"
            name: "edge_p1_body"
            widget: "text"
            default: "We build environments where learners do things, not watch things."
          - label: "Principle 2 Title"
            name: "edge_p2_title"
            widget: "string"
            default: "Modular & Scalable"
          - label: "Principle 2 Body"
            name: "edge_p2_body"
            widget: "text"
            default: "Every program we build is architected for reuse."
          - label: "Principle 3 Title"
            name: "edge_p3_title"
            widget: "string"
            default: "Learner-First, Business-Driven"
          - label: "Principle 3 Body"
            name: "edge_p3_body"
            widget: "text"
            default: "We design for the person doing the work."
          - label: "Principle 4 Title"
            name: "edge_p4_title"
            widget: "string"
            default: "Technology as Enabler"
          - label: "Principle 4 Body"
            name: "edge_p4_body"
            widget: "text"
            default: "We're technology-agnostic, not technology-obsessed."
          - label: "Principle 5 Title"
            name: "edge_p5_title"
            widget: "string"
            default: "Measured Against Business Results"
          - label: "Principle 5 Body"
            name: "edge_p5_body"
            widget: "text"
            default: "We commit to success metrics before we start designing."
          - label: "Principle 6 Title"
            name: "edge_p6_title"
            widget: "string"
            default: "Partnership Over Vendor Relationship"
          - label: "Principle 6 Body"
            name: "edge_p6_body"
            widget: "text"
            default: "We embed with your team. We flag problems before you do."

  # ── TALK TO US PANEL ──────────────────────────────────────────────────────
  - name: "contact"
    label: "📬 Talk To Us Panel"
    files:
      - label: "Contact Panel"
        name: "contact_panel"
        file: "index.html"
        fields:
          - label: "Panel Heading"
            name: "panel_heading"
            widget: "string"
            default: "Talk to Our Experts"
          - label: "Panel Tagline"
            name: "panel_tag"
            widget: "string"
            default: "Ready to transform how your organization learns?"
          - label: "Panel Body Text"
            name: "panel_body"
            widget: "text"
            default: "Tell us your challenge. Our team will design a solution that drives real business results — not just training hours."
          - label: "Request Button Text"
            name: "panel_btn1"
            widget: "string"
            default: "Request a Consultation →"
          - label: "Email Button Text"
            name: "panel_btn2"
            widget: "string"
            default: "Email Us Directly"
          - label: "Contact Email Address"
            name: "panel_email"
            widget: "string"
            default: "ldex@sutherland.com"
          - label: "Stat 1 Number"
            name: "panel_s1_num"
            widget: "string"
            default: "22"
          - label: "Stat 1 Label"
            name: "panel_s1_lbl"
            widget: "string"
            default: "Brandon Hall Group Awards — Gold, Silver & Bronze"
          - label: "Stat 2 Number"
            name: "panel_s2_num"
            widget: "string"
            default: "9"
          - label: "Stat 2 Label"
            name: "panel_s2_lbl"
            widget: "string"
            default: "Learning modalities, one seamless partner"
          - label: "Stat 3 Number"
            name: "panel_s3_num"
            widget: "string"
            default: "100%"
          - label: "Stat 3 Label"
            name: "panel_s3_lbl"
            widget: "string"
            default: "Tailored to your business context"

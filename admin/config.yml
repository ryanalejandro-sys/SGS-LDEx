backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:

  # ── HOME PAGE ──────────────────────────────────────────────────────────────
  - name: "home"
    label: "🏠 Home Page"
    files:

      - label: "Hero Section"
        name: "hero"
        file: "index.html"
        fields:
          - label: "Hero Headline"
            name: "hero_headline"
            widget: "string"
            hint: "Main headline in the hero section"
            default: "Learning Experiences That Build Real Capability."
          - label: "Hero Body Text"
            name: "hero_body"
            widget: "text"
            hint: "Paragraph text below the headline"
            default: "LDEx engineers learning experiences that build real capability, accelerate performance, and deliver measurable ROI — from day one."
          - label: "Hero CTA Button 1"
            name: "hero_cta1"
            widget: "string"
            default: "Talk to Our Experts →"
          - label: "Hero CTA Button 2"
            name: "hero_cta2"
            widget: "string"
            default: "See Our Products"
          - label: "Hero Stat 1 Number"
            name: "stat1_num"
            widget: "string"
            default: "22"
          - label: "Hero Stat 1 Label"
            name: "stat1_lbl"
            widget: "string"
            default: "Brandon Hall Awards"
          - label: "Hero Stat 2 Number"
            name: "stat2_num"
            widget: "string"
            default: "9"
          - label: "Hero Stat 2 Label"
            name: "stat2_lbl"
            widget: "string"
            default: "Learning modalities"
          - label: "Hero Stat 3 Number"
            name: "stat3_num"
            widget: "string"
            default: "GDPR"
          - label: "Hero Stat 3 Label"
            name: "stat3_lbl"
            widget: "string"
            default: "Compliant"
          - label: "Hero Stat 4 Number"
            name: "stat4_num"
            widget: "string"
            default: "Global"
          - label: "Hero Stat 4 Label"
            name: "stat4_lbl"
            widget: "string"
            default: "Scale"

      - label: "Who We Are Section"
        name: "who_we_are"
        file: "index.html"
        fields:
          - label: "Section Eyebrow"
            name: "who_eyebrow"
            widget: "string"
            default: "Who We Are"
          - label: "Section Headline"
            name: "who_headline"
            widget: "string"
            default: "We Don't Build Training. We Build Capability."
          - label: "Paragraph 1"
            name: "who_p1"
            widget: "text"
            default: "The Sutherland LDEx team is your dedicated center of excellence for enterprise learning."
          - label: "Paragraph 2"
            name: "who_p2"
            widget: "text"
            default: "Whether you need to onboard thousands of new hires at speed, upskill a global workforce in a complex domain, or transform a broken learning culture, we bring the strategic thinking and technical horsepower to make it happen."
          - label: "Paragraph 3"
            name: "who_p3"
            widget: "text"
            default: "We're not a vendor. We're a learning partner — embedded, accountable, and invested in your outcomes."

      - label: "Recognition / Awards Section"
        name: "awards"
        file: "index.html"
        fields:
          - label: "Section Eyebrow"
            name: "awards_eyebrow"
            widget: "string"
            default: "Recognition"
          - label: "Section Headline"
            name: "awards_headline"
            widget: "string"
            default: "World-Class Learning, Recognized Globally"
          - label: "Section Subtext"
            name: "awards_sub"
            widget: "text"
            default: "Our programs have earned Gold, Silver, and Bronze recognition from the Brandon Hall Group."
          - label: "Total Awards Count"
            name: "awards_total"
            widget: "string"
            default: "22"
          - label: "Gold Awards Count"
            name: "awards_gold"
            widget: "string"
            default: "15"
          - label: "Silver Awards Count"
            name: "awards_silver"
            widget: "string"
            default: "4"
          - label: "Bronze Awards Count"
            name: "awards_bronze"
            widget: "string"
            default: "3"

      - label: "Industries Section"
        name: "industries"
        file: "index.html"
        fields:
          - label: "Section Eyebrow"
            name: "ind_eyebrow"
            widget: "string"
            default: "Industries"
          - label: "Section Headline"
            name: "ind_headline"
            widget: "string"
            default: "Learning Solutions Across Every Industry"
          - label: "Section Subtext"
            name: "ind_sub"
            widget: "text"
            default: "Backed by nearly four decades of Sutherland expertise, LDEx has designed and delivered high-impact learning programs across the industries that shape the global economy."

      - label: "Products Section"
        name: "products"
        file: "index.html"
        fields:
          - label: "Section Eyebrow"
            name: "prod_eyebrow"
            widget: "string"
            default: "Products"
          - label: "Section Headline"
            name: "prod_headline"
            widget: "string"
            default: "Every Learning Challenge. One Expert Partner."
          - label: "Section Subtext"
            name: "prod_sub"
            widget: "text"
            default: "From browser-based eLearning to fully immersive VR — we match the right modality to your specific need, audience, and budget."

      - label: "Business Case Section"
        name: "business_case"
        file: "index.html"
        fields:
          - label: "Section Eyebrow"
            name: "bc_eyebrow"
            widget: "string"
            default: "The Business Case"
          - label: "Section Headline"
            name: "bc_headline"
            widget: "string"
            default: "What You Get When You Partner With LDEx"
          - label: "Benefit 1 Title"
            name: "ben1_title"
            widget: "string"
            default: "Faster Time to Proficiency"
          - label: "Benefit 1 Body"
            name: "ben1_body"
            widget: "text"
            default: "Cut the gap between hire date and full productivity."
          - label: "Benefit 2 Title"
            name: "ben2_title"
            widget: "string"
            default: "Learning That Actually Sticks"
          - label: "Benefit 2 Body"
            name: "ben2_body"
            widget: "text"
            default: "Our multi-modality approach combines cognitive science with modern technology to build durable knowledge."
          - label: "Benefit 3 Title"
            name: "ben3_title"
            widget: "string"
            default: "A Partner You Don't Have to Manage"
          - label: "Benefit 3 Body"
            name: "ben3_body"
            widget: "text"
            default: "From needs analysis to post-launch measurement, LDEx handles the complexity."

      - label: "Footer"
        name: "footer"
        file: "index.html"
        fields:
          - label: "Brand Description"
            name: "footer_desc"
            widget: "text"
            default: "A Sutherland Center of Excellence — engineering learning experiences that build real capability and drive measurable business performance."
          - label: "Copyright Year"
            name: "footer_year"
            widget: "string"
            default: "2026"
          - label: "Contact Email"
            name: "footer_email"
            widget: "string"
            default: "ldex@sutherland.com"

  # ── MANAGED LEARNING SERVICES ─────────────────────────────────────────────
  - name: "mls"
    label: "📦 Managed Learning Services"
    files:
      - label: "Page Content"
        name: "mls_content"
        file: "index.html"
        fields:
          - label: "Page Headline"
            name: "mls_headline"
            widget: "string"
            default: "Managed Learning Services"
          - label: "Page Lead Text"
            name: "mls_lead"
            widget: "text"
            default: "You brief us, we build it — from scratch to launch, and through every update."
          - label: "Service 1 Title"
            name: "mls_s1_title"
            widget: "string"
            default: "Learning Needs Analysis & Strategy"
          - label: "Service 1 Body"
            name: "mls_s1_body"
            widget: "text"
            default: "We start by understanding your business goals, audience, and gaps."
          - label: "Service 2 Title"
            name: "mls_s2_title"
            widget: "string"
            default: "End-to-End Course Design & Development"
          - label: "Service 2 Body"
            name: "mls_s2_body"
            widget: "text"
            default: "From instructional design and storyboarding to full production."
          - label: "Service 3 Title"
            name: "mls_s3_title"
            widget: "string"
            default: "Quality Assurance & Review Management"
          - label: "Service 3 Body"
            name: "mls_s3_body"
            widget: "text"
            default: "We manage the review cycle so you don't have to."
          - label: "Service 4 Title"
            name: "mls_s4_title"
            widget: "string"
            default: "Content Updates & Maintenance"
          - label: "Service 4 Body"
            name: "mls_s4_body"
            widget: "text"
            default: "Products change. Policies update. Processes evolve."
          - label: "Service 5 Title"
            name: "mls_s5_title"
            widget: "string"
            default: "Multi-Format Production"
          - label: "Service 5 Body"
            name: "mls_s5_body"
            widget: "text"
            default: "One engagement, any format."
          - label: "Service 6 Title"
            name: "mls_s6_title"
            widget: "string"
            default: "LMS-Ready Deployment Packages"
          - label: "Service 6 Body"
            name: "mls_s6_body"
            widget: "text"
            default: "Every deliverable is packaged and tested for your LMS."

  # ── PRODUCT PAGES ──────────────────────────────────────────────────────────
  - name: "products_pages"
    label: "🎓 Product Pages"
    files:

      - label: "Immersive Learning"
        name: "immersive"
        file: "index.html"
        fields:
          - label: "Page Headline"
            name: "imm_headline"
            widget: "string"
            default: "Immersive Learning"
          - label: "Page Lead Text"
            name: "imm_lead"
            widget: "text"
            default: "Put your people inside the experience."
          - label: "Video Section Title"
            name: "imm_video_title"
            widget: "string"
            default: "Immersive Learning in Action"
          - label: "Video Section Description"
            name: "imm_video_desc"
            widget: "text"
            default: "See how LDEx creates browser-based to fully immersive environments."
          - label: "Tier 1 Title"
            name: "imm_t1"
            widget: "string"
            default: "Foundation — Guided Experiences"
          - label: "Tier 2 Title"
            name: "imm_t2"
            widget: "string"

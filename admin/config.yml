            name: "ada_headline"
            widget: "string"
            default: "Adaptive Learning"
          - label: "Page Lead Text"
            name: "ada_lead"
            widget: "text"
            default: "Training that learns with you. Personalized paths, smarter progress."

      - label: "Gamified Learning"
        name: "gamified"
        file: "index.html"
        fields:
          - label: "Page Headline"
            name: "gam_headline"
            widget: "string"
            default: "Gamified Learning"
          - label: "Page Lead Text"
            name: "gam_lead"
            widget: "text"
            default: "Turn skills into achievements. Learn by playing, level up by doing."

      - label: "Scenario Based Learning"
        name: "scenario"
        file: "index.html"
        fields:
          - label: "Page Headline"
            name: "sce_headline"
            widget: "string"
            default: "Scenario Based Learning"
          - label: "Page Lead Text"
            name: "sce_lead"
            widget: "text"
            default: "Real choices. Real consequences. Real learning that sticks."

      - label: "Video Based Learning"
        name: "video"
        file: "index.html"
        fields:
          - label: "Page Headline"
            name: "vid_headline"
            widget: "string"
            default: "Video Based Learning"
          - label: "Page Lead Text"
            name: "vid_lead"
            widget: "text"
            default: "Watch, learn, and act. Stories that teach, visuals that move."

      - label: "Simulation Based Learning"
        name: "simulation"
        file: "index.html"
        fields:
          - label: "Page Headline"
            name: "sim_headline"
            widget: "string"
            default: "Simulation Based Learning"
          - label: "Page Lead Text"
            name: "sim_lead"
            widget: "text"
            default: "Practice without the pressure. Safe-to-fail spaces for real-world mastery."

      - label: "eLearning Module"
        name: "elearning"
        file: "index.html"
        fields:
          - label: "Page Headline"
            name: "el_headline"
            widget: "string"
            default: "eLearning Module"
          - label: "Page Lead Text"
            name: "el_lead"
            widget: "text"
